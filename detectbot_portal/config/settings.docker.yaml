database:
  backend: sqlite
  sqlite:
    path: /app/detectbot_portal/data/detectbot_portal.sqlite3
    busy_timeout_ms: 5000
  postgresql:
    host: postgres
    port: 5432
    database: detectbot_portal
    user: detectbot
    password_enc: ""
    pool_pre_ping: true
    pool_size: 5
    max_overflow: 10
app:
  reports_dir: /app/detectbot_portal/data/reports
  auto_seed_demo_data: true
  max_upload_size_mb: 10
